[build-system]
requires = ["setuptools>=45", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "similarity"
version = "0.1"
description = "Predict mass spectra of peptides and measure their similarity"
readme = "README.md"
requires-python = ">=3.8"
license = {text = "MIT"}
authors = [
    {name = "Lev Levitsky", email = "levitsky@bmb.sdu.dk"},
    {name = "Charlotte Adams", email = "Charlotte.Adams@uantwerpen.be"}
]
keywords = ["mass spectrometry", "peptides", "spectra", "similarity"]
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
]

dependencies = [
    "MSCI", "matchms",
    "pyopenms" # for MSCI.Preprocessing.Parsing
]

[project.urls]

[project.scripts]
run = "similarity.cli:experiment"

[tool.setuptools]
packages = ["similarity"]

